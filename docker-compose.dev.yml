# Development override — live-reload for frontend & backend
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up --build

services:
  backend:
    volumes:
      - ./backend:/app
      - uploads-data:/app/uploads
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - ./src:/usr/src/app/src
      - ./public:/usr/src/app/public
      - ./angular.json:/usr/src/app/angular.json
      - ./tsconfig.json:/usr/src/app/tsconfig.json
      - ./tsconfig.app.json:/usr/src/app/tsconfig.app.json
      - ./tsconfig.spec.json:/usr/src/app/tsconfig.spec.json
      - ./proxy.conf.json:/usr/src/app/proxy.conf.json
      - ./.postcssrc.json:/usr/src/app/.postcssrc.json
    ports:
      - "4200:4200"
